<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Pasta House</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="navbar" role="banner">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" aria-label="Pasta House - Home">
      <img src="assets/logo.png" alt="Pasta House logo" width="44" height="44" />
      <span class="nav-logo-text">Pasta <span>House</span></span>
    </a>
    <nav aria-label="Primary navigation">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="nav-cta"></div>
  </div>
</header>

<main class="auth-page-shell">
  <section class="auth-card" aria-labelledby="login-title">
    <p class="section-label">Customer Account</p>
    <h1 id="login-title">Welcome Back</h1>
    <p>Log in to checkout faster and view your Pasta House order history.</p>
    <div class="auth-notice" id="login-notice"></div>
    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input class="form-control" type="email" id="login-email" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input class="form-control" type="password" id="login-password" autocomplete="current-password" required />
      </div>
      <button class="btn btn-gold btn-md" type="submit" style="justify-content:center;">Log In</button>
    </form>
    <p class="auth-switch">New here? <a href="signup.html">Create an account</a></p>
  </section>
</main>

<script src="config.js" defer></script>
<script src="js/script.js" defer></script>
<script src="js/login.js" defer></script>
</body>
</html>
